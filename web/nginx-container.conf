# Inside-container nginx config for the Svelte SPA.
# This nginx only serves static files — the host nginx (see deploy/nginx.conf)
# is the one terminating TLS and routing /map/* to this container.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path returns index.html so the JS
    # router can handle it. Real assets (with extensions) are served
    # as-is or 404 if missing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints asset filenames; safe to cache forever.
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Light hardening
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
